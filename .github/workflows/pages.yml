name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot 4
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.6.3"
          use-dotnet: false
          # Include web export templates (they ship separately from the editor)
          include-templates: true

      - name: Export Web release
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" --path ./project ../build/web/index.html

      - name: Cache-bust Godot assets in HTML
        run: |
          # Add cache-busting query strings to .wasm and .pck references in the HTML
          TS=$(date -u +%Y%m%d%H%M%S)
          sed -i "s/\(index\.wasm\)/\1?v=$TS/g" build/web/index.html
          sed -i "s/\(index\.pck\)/\1?v=$TS/g" build/web/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
